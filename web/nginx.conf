# Strange Delivery — web (Vite SPA) on a VPS behind Nginx.
# Copy to /etc/nginx/sites-available/strange-delivery, symlink into
# sites-enabled, edit server_name + root, then: nginx -t && systemctl reload nginx
#
# For HTTPS, run `certbot --nginx -d your-domain.com` after this is live; certbot
# rewrites this block to listen on 443 and adds the certificate lines.

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;            # ← đổi thành domain thật

    root /var/www/strange-delivery/dist;    # ← nơi copy thư mục dist/ lên
    index index.html;

    # ---- Compression -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # ---- Hashed build assets: cache forever (filename changes each build) ---
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- SPA fallback: every unknown path serves index.html ----------------
    # Without this, refreshing /login, /track/:id, /d/:id, /admin/* gives a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- index.html must never be cached, so new deploys are seen at once ---
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ---- Basic hardening ---------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- OPTIONAL: serve the Laravel API from the same domain --------------
    # If you proxy the API here, set VITE_API_URL=/api at build time and you get
    # same-origin requests (no CORS to configure at all).
    # location /api/ {
    #     proxy_pass http://127.0.0.1:8000;   # ← where php artisan serve / php-fpm listens
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
